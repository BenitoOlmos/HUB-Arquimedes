version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: hub-arquimedes-db
    restart: always
    environment:
      POSTGRES_USER: admin_arquimedes
      POSTGRES_PASSWORD: admin_password_secure
      POSTGRES_DB: arquimedes_database
    ports:
      - "${HOST_PORT_DB:-20002}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_arquimedes -d arquimedes_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/api-arquimedes/Dockerfile
    container_name: hub-arquimedes-backend
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://admin_arquimedes:admin_password_secure@db:5432/arquimedes_database?schema=public
      - PORT=20001
      - LOG_LEVEL=info
    ports:
      - "${HOST_PORT_BACKEND:-20001}:20001"
    depends_on:
      db:
        condition: service_healthy

  frontend-centrifuga:
    build:
      context: ..
      dockerfile: frontend/centrifuga-arquimedes/Dockerfile
    container_name: hub-arquimedes-frontend-centrifuga
    restart: always
    ports:
      - "${HOST_PORT_CENTRIFUGA:-20000}:80"
    depends_on:
      - backend

  frontend-tallerautomotriz:
    build:
      context: ..
      dockerfile: frontend/erp-taller-automotriz/Dockerfile
    container_name: hub-arquimedes-frontend-tallerautomotriz
    restart: always
    ports:
      - "${HOST_PORT_TALLERAUTOMOTRIZ:-20005}:80"
    depends_on:
      - backend

  frontend-smartport:
    build:
      context: ..
      dockerfile: frontend/smart-port-erp/Dockerfile
    container_name: hub-arquimedes-frontend-smartport
    restart: always
    ports:
      - "${HOST_PORT_SMARTPORT:-20007}:80"
    depends_on:
      - backend

  frontend-agrotech:
    build:
      context: ..
      dockerfile: frontend/agrotech-dashboard/Dockerfile
    container_name: hub-arquimedes-frontend-agrotech
    restart: always
    ports:
      - "${HOST_PORT_AGROTECH:-20008}:80"
    depends_on:
      - backend

  frontend-fintech:
    build:
      context: ..
      dockerfile: frontend/fintech-sandbox/Dockerfile
    container_name: hub-arquimedes-frontend-fintech
    restart: always
    ports:
      - "${HOST_PORT_FINTECH:-20009}:80"
    depends_on:
      - backend

  frontend-scada:
    build:
      context: ..
      dockerfile: frontend/scada-renovables/Dockerfile
    container_name: hub-arquimedes-frontend-scada
    restart: always
    ports:
      - "${HOST_PORT_SCADA:-20010}:80"
    depends_on:
      - backend

  frontend-retail:
    build:
      context: ..
      dockerfile: frontend/retail-analytics-engine/Dockerfile
    container_name: hub-arquimedes-frontend-retail
    restart: always
    ports:
      - "${HOST_PORT_RETAIL:-20011}:80"
    depends_on:
      - backend

  frontend-smartcity:
    build:
      context: ..
      dockerfile: frontend/smart-city-hub/Dockerfile
    container_name: hub-arquimedes-frontend-smartcity
    restart: always
    ports:
      - "${HOST_PORT_SMARTCITY:-20012}:80"
    depends_on:
      - backend

  frontend-industry:
    build:
      context: ..
      dockerfile: frontend/industry40-digital-twin/Dockerfile
    container_name: hub-arquimedes-frontend-industry
    restart: always
    ports:
      - "${HOST_PORT_INDUSTRY40:-20013}:80"
    depends_on:
      - backend

  frontend-web:
    build:
      context: ..
      dockerfile: frontend/web-arquimedes/Dockerfile
    container_name: hub-arquimedes-frontend-web
    restart: always
    ports:
      - "${HOST_PORT_WEB:-20004}:80"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ${COMPOSE_PROJECT_NAME}_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - frontend-centrifuga
      - frontend-tallerautomotriz
      - frontend-smartport
      - frontend-agrotech
      - frontend-fintech
      - frontend-scada
      - frontend-retail
      - frontend-smartcity
      - frontend-industry
      - frontend-web
      - backend

volumes:
  pg_data:
    name: hub-arquimedes-pgdata
